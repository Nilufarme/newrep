<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: #EFF6FF;
  color: #0F172A;
  font-size: 15px;
  line-height: 1.4;
  overscroll-behavior: none;
}
button { font: inherit; border: 0; background: transparent; cursor: pointer; color: inherit; padding: 0; }
input, textarea { font: inherit; border: 0; outline: 0; background: transparent; color: inherit; }
ul, ol { margin: 0; padding: 0; list-style: none; }
h1, h2, h3, p { margin: 0; }

#app { max-width: 28rem; margin: 0 auto; min-height: 100vh; padding-bottom: 6rem; position: relative; }

/* ─── Onboarding ─── */
.onboarding {
position: fixed; top: 0; right: 0; bottom: 0; left: 0; display: flex; flex-direction: column;
align-items: center; justify-content: center; padding: 24px;
background: #EFF6FF;
background-image:
radial-gradient(ellipse 700px 500px at 20% 10%, rgba(37, 99, 235, 0.12), transparent 60%),
radial-gradient(ellipse 600px 600px at 100% 50%, rgba(14, 165, 233, 0.10), transparent 60%);
text-align: center;
}
.onb-logo {
width: 80px; height: 80px; border-radius: 24px;
background: linear-gradient(135deg, #2563EB, #0EA5E9);
display: flex; align-items: center; justify-content: center;
color: white; font-size: 48px; font-weight: 800; letter-spacing: -0.05em;
box-shadow: 0 20px 50px rgba(37, 99, 235, 0.35);
margin-bottom: 24px;
animation: float 4s ease-in-out infinite;
}
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.onb-h1 { font-size: 36px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 12px; color: #0F172A; }
.onb-h1 span { color: #2563EB; }
.onb-sub { color: #475569; margin-bottom: 40px; font-size: 15px; }
.onb-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #64748B; font-weight: 600; margin-bottom: 12px; }
.onb-input {
width: 100%; max-width: 320px; padding: 16px 20px; font-size: 18px; text-align: center;
border: 2px solid #BFDBFE; border-radius: 16px; background: white; margin-bottom: 16px;
}
.onb-button {
width: 100%; max-width: 320px; padding: 16px; font-size: 16px; font-weight: 700;
background: linear-gradient(135deg, #2563EB, #0EA5E9); color: white;
border-radius: 16px; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
}
.onb-button:disabled { background: #BFDBFE; box-shadow: none; }

/* ─── Header ─── */
.header { padding: 40px 24px 16px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
width: 40px; height: 40px; border-radius: 14px;
background: linear-gradient(135deg, #2563EB, #0EA5E9);
display: flex; align-items: center; justify-content: center;
color: white; font-size: 22px; font-weight: 800; letter-spacing: -0.05em;
}
.brand-name { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; color: #0F172A; }
.streak-badge {
display: flex; align-items: center; gap: 6px;
padding: 6px 12px; border-radius: 999px; font-weight: 700; font-size: 14px;
background: linear-gradient(135deg, #2563EB, #0EA5E9); color: white;
}
.greet-date { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #64748B; }
.greet-h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; margin-top: 4px; color: #0F172A; }
.greet-h1 span { color: #2563EB; }

/* ─── Cards ─── */
.card { background: #FFFFFF; border-radius: 24px; padding: 20px; margin: 0 24px 16px; box-shadow: 0 4px 20px rgba(37,99,235,0.08); }
.card-lg { padding: 24px; }
.card-title { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #64748B; font-weight: 600; }
.card-h { font-size: 18px; font-weight: 700; color: #0F172A; margin-top: 4px; }

/* ─── Today ─── */
.cal-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-num { font-size: 36px; font-weight: 700; color: #0F172A; }
.cal-num small { font-size: 17px; font-weight: 400; color: #64748B; margin-left: 8px; }
.cal-ring { width: 76px; height: 76px; position: relative; }
.cal-ring svg { transform: rotate(-90deg); }
.cal-ring-icon { position: absolute; top: 0; right: 0; bottom: 0; left: 0; display: flex; align-items: center; justify-content: center; color: #2563EB; }
.meals-row { display: flex; gap: 8px; }
.meal-pill { flex: 1; padding: 10px 8px; border-radius: 12px; text-align: center; background: #DBEAFE; }
.meal-pill.done { background: #0D9488; color: white; }
.meal-pill-label { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: #64748B; font-weight: 600; }
.meal-pill.done .meal-pill-label { color: white; }
.meal-pill-check { display: none; margin-top: 4px; font-size: 14px; }
.meal-pill.done .meal-pill-check { display: block; }

.water-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.water-label { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; }
.water-bars { display: flex; gap: 6px; margin-bottom: 12px; }
.water-bar { flex: 1; height: 12px; border-radius: 6px; background: #DBEAFE; transition: background 0.2s; }
.water-bar.filled { background: #0EA5E9; }
.water-buttons { display: flex; gap: 8px; }
.btn-secondary { flex: 1; padding: 10px; border-radius: 12px; background: #DBEAFE; color: #475569; font-weight: 600; font-size: 14px; }
.btn-primary { flex: 1; padding: 10px; border-radius: 12px; background: linear-gradient(135deg, #0EA5E9, #2563EB); color: white; font-weight: 600; font-size: 14px; }

.food-list { display: flex; flex-direction: column; gap: 8px; }
.food-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 12px; background: #EFF6FF; }
.food-name { font-size: 14px; color: #0F172A; }
.food-meal { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: #64748B; font-weight: 600; }
.food-cal { font-size: 14px; font-weight: 700; color: #2563EB; margin-right: 12px; }

/* ─── Lists / common ─── */
.empty { text-align: center; padding: 32px; color: #64748B; }

/* ─── Nav ─── */
.fab {
position: fixed; right: 20px; bottom: 88px; z-index: 50;
width: 56px; height: 56px; border-radius: 50%;
background: linear-gradient(135deg, #2563EB, #0EA5E9);
color: white; display: flex; align-items: center; justify-content: center;
box-shadow: 0 10px 30px rgba(37,99,235,0.4);
font-size: 28px; font-weight: 600; line-height: 1;
}
.nav {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
padding: 8px 16px 16px;
background: linear-gradient(to top, #EFF6FF 60%, rgba(239,246,255,0));
}
.nav-inner {
max-width: 28rem; margin: 0 auto;
display: flex; align-items: center; justify-content: space-around;
background: #0F172A; border-radius: 999px; padding: 10px 8px;
box-shadow: 0 12px 40px rgba(37,99,235,0.18);
}
.nav-btn {
display: flex; flex-direction: column; align-items: center; gap: 2px;
padding: 6px 8px; color: #64748B; font-size: 9px; letter-spacing: 0.05em;
text-transform: uppercase; font-weight: 600;
}
.nav-btn.active { color: #93C5FD; }
.nav-btn svg { width: 18px; height: 18px; }

/* ─── Modals ─── */
.modal-bg { position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: rgba(15,23,42,0.5); z-index: 60; display: flex; align-items: flex-end; justify-content: center; padding: 16px; }
.modal {
width: 100%; max-width: 28rem; max-height: 85vh; overflow-y: auto;
background: white; border-radius: 24px; padding: 24px;
animation: slideUp 0.3s ease-out;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-size: 22px; font-weight: 700; }
.modal-close { width: 32px; height: 32px; color: #64748B; font-size: 22px; line-height: 1; }

/* ─── Food add list ─── */
.food-pick { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 14px; border-radius: 16px; background: #EFF6FF; margin-bottom: 8px; text-align: left; }
.food-pick-name { font-weight: 600; font-size: 14px; }
.food-pick-meal { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: #64748B; font-weight: 600; margin-top: 2px; }
.food-pick-cal { font-weight: 700; color: #2563EB; }

/* ─── Recipe list ─── */
.recipe-card { display: block; width: 100%; padding: 20px; border-radius: 24px; background: white; box-shadow: 0 4px 20px rgba(37,99,235,0.08); margin-bottom: 12px; text-align: left; }
.recipe-card-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.recipe-name { font-size: 20px; font-weight: 700; line-height: 1.15; flex: 1; padding-right: 12px; }
.recipe-cal { text-align: right; }
.recipe-cal-num { font-size: 24px; font-weight: 700; color: #2563EB; line-height: 1; }
.recipe-cal-unit { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: #64748B; font-weight: 600; }
.recipe-desc { font-size: 14px; color: #475569; margin-bottom: 12px; }
.recipe-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
.recipe-meta-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #64748B; }
.recipe-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.recipe-tag { padding: 2px 10px; font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; border-radius: 999px; background: #DBEAFE; color: #2563EB; font-weight: 600; }
.recipe-custom-badge { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #0D9488; font-weight: 700; margin-bottom: 4px; }

/* ─── Recipe detail ─── */
.det-h { font-size: 28px; font-weight: 700; line-height: 1.1; }
.det-desc { font-size: 14px; color: #475569; margin: 12px 0 20px; }
.det-meta { display: flex; flex-wrap: wrap; gap: 16px; padding-bottom: 20px; margin-bottom: 20px; border-bottom: 1px solid #DBEAFE; font-size: 13px; color: #475569; }
.det-meta-item { display: flex; align-items: center; gap: 6px; }
.det-section-h { font-size: 17px; font-weight: 700; margin-bottom: 12px; color: #0F172A; }
.det-ing { display: flex; gap: 12px; margin-bottom: 8px; font-size: 14px; align-items: flex-start; }
.det-ing-bullet { width: 6px; height: 6px; border-radius: 50%; background: #2563EB; margin-top: 8px; flex-shrink: 0; }
.det-step { display: flex; gap: 12px; margin-bottom: 12px; font-size: 14px; line-height: 1.55; align-items: flex-start; }
.det-step-num { font-weight: 700; color: #2563EB; font-size: 16px; flex-shrink: 0; min-width: 22px; }
.det-source { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-radius: 16px; background: #DBEAFE; color: #0F172A; text-decoration: none; font-size: 14px; margin-top: 16px; }
.det-delete { width: 100%; padding: 12px; border-radius: 16px; border: 1px solid #BFDBFE; color: #64748B; font-size: 14px; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }

/* ─── Add recipe form ─── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #64748B; font-weight: 600; margin-bottom: 6px; }
.form-input { width: 100%; padding: 10px 16px; font-size: 14px; background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 12px; }
.form-textarea { width: 100%; padding: 10px 16px; font-size: 14px; background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 12px; resize: none; font-family: inherit; }
.form-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.form-button { width: 100%; padding: 14px; border-radius: 16px; background: linear-gradient(135deg, #2563EB, #0EA5E9); color: white; font-weight: 600; font-size: 14px; margin-top: 8px; }
.form-button:disabled { background: #BFDBFE; }

/* ─── Plan ─── */
.day-card { background: white; border-radius: 24px; padding: 20px; margin: 0 24px 12px; box-shadow: 0 4px 20px rgba(37,99,235,0.08); }
.day-h { font-size: 20px; font-weight: 700; margin-bottom: 12px; color: #0F172A; }
.meal-row-edit { display: flex; align-items: center; gap: 8px; padding-bottom: 8px; border-bottom: 1px solid #DBEAFE; }
.meal-row-edit:last-child { border-bottom: 0; padding-bottom: 0; }
.meal-row-label { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: #64748B; font-weight: 600; width: 60px; flex-shrink: 0; }
.meal-row-value { flex: 1; font-size: 14px; min-width: 0; }
.meal-row-value.empty-val { color: #64748B; font-style: italic; }
.meal-row-edit-btn { padding: 8px; border-radius: 8px; background: #DBEAFE; color: #2563EB; font-size: 14px; flex-shrink: 0; }
.meal-row-input { flex: 1; padding: 6px 12px; font-size: 14px; background: #EFF6FF; border: 1px solid #2563EB; border-radius: 8px; min-width: 0; }
.meal-row-save { padding: 8px; border-radius: 8px; background: #0D9488; color: white; font-weight: 700; }
.meal-row-cancel { padding: 8px; border-radius: 8px; color: #64748B; }

/* ─── Shopping ─── */
.shop-add { display: flex; gap: 8px; padding: 0 24px; margin-bottom: 16px; }
.shop-add input { flex: 1; padding: 12px 16px; font-size: 14px; background: white; border: 1px solid #BFDBFE; border-radius: 16px; }
.shop-add button { padding: 0 20px; font-weight: 600; font-size: 14px; background: linear-gradient(135deg, #2563EB, #0EA5E9); color: white; border-radius: 16px; }
.shop-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 16px; background: white; margin-bottom: 8px; }
.shop-item.done { background: #DBEAFE; }
.shop-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #94A3B8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.shop-check.checked { background: #0D9488; border-color: #0D9488; color: white; font-size: 14px; }
.shop-name { flex: 1; font-size: 14px; }
.shop-item.done .shop-name { text-decoration: line-through; opacity: 0.5; }
.shop-del { color: #64748B; padding: 4px; font-size: 16px; line-height: 1; }

/* ─── Stats ─── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 24px; margin-bottom: 16px; }
.stat-card { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 4px 20px rgba(37,99,235,0.08); }
.stat-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.stat-card-head svg { width: 18px; height: 18px; }
.stat-card-label { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: #64748B; font-weight: 600; }
.stat-card-value { font-size: 24px; font-weight: 700; color: #0F172A; line-height: 1; }
.stat-card-unit { font-size: 11px; color: #64748B; margin-top: 4px; }

.chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 140px; padding-top: 20px; position: relative; }
.chart-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; position: relative; }
.chart-bar { width: 100%; border-radius: 8px 8px 0 0; transition: height 0.3s; }
.chart-bar.bg { background: #DBEAFE; }
.chart-bar.mid { background: #93C5FD; }
.chart-bar.today { background: linear-gradient(180deg, #2563EB, #0EA5E9); }
.chart-bar-label { font-size: 10px; margin-top: 6px; color: #64748B; font-weight: 600; }
.chart-bar-label.today { color: #2563EB; }
.chart-goal-line { position: absolute; left: 0; right: 0; border-top: 1px dashed #BFDBFE; }

.water-row-chart { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.water-row-label { font-size: 12px; font-weight: 600; color: #64748B; width: 28px; }
.water-row-label.today { color: #2563EB; }
.water-row-bar { flex: 1; height: 24px; border-radius: 12px; background: #EFF6FF; overflow: hidden; }
.water-row-fill { height: 100%; border-radius: 12px; background: #BFDBFE; }
.water-row-fill.hit { background: linear-gradient(90deg, #0EA5E9, #2563EB); }
.water-row-num { font-size: 14px; font-weight: 700; width: 32px; text-align: right; }

.meals-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.meals-grid-cell { width: 20px; height: 20px; border-radius: 4px; background: #EFF6FF; }
.meals-legend { display: flex; align-items: center; gap: 12px; font-size: 10px; color: #64748B; font-weight: 600; }
.meals-legend-item { display: flex; align-items: center; gap: 4px; }
.meals-legend-cell { width: 12px; height: 12px; border-radius: 3px; }

/* ─── Health alert ─── */
.alert-modal { border: 2px solid #2563EB; }
.alert-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
.alert-icon-box { width: 48px; height: 48px; border-radius: 16px; background: #DBEAFE; display: flex; align-items: center; justify-content: center; color: #2563EB; font-size: 22px; flex-shrink: 0; }
.alert-card { padding: 16px; border-radius: 16px; background: #EFF6FF; margin-bottom: 12px; }
.alert-card-h { font-size: 16px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.alert-card-msg { font-size: 13px; line-height: 1.5; color: #475569; }

/* ─── Status badges (yesterday history) ─── */
.error-display {
position: fixed; top: 16px; left: 16px; right: 16px; z-index: 9999;
background: #FEE2E2; color: #991B1B; padding: 12px; border-radius: 12px;
font-size: 13px; font-family: monospace; word-break: break-word;
display: none;
}
</style>

</head>

if (d.today.mealsEaten.breakfast) mealsCount++;
if (d.today.mealsEaten.lunch) mealsCount++;
if (d.today.mealsEaten.dinner) mealsCount++;
}
if (!d.history) d.history = [];

if (d.history.length > 90) d.history = d.history.slice(d.history.length - 90);
d.streak = allEaten ? ((d.streak || 0) + 1) : 0;
d.today = { date: ts, calories: [], water: 0, mealsEaten: { breakfast: false, lunch: false, dinner: false } };
}
data = d;
} catch (e) {}
}
